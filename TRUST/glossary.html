<!doctype html>
<!--
  Purpose: Preserve legacy Trust glossary links by forwarding them to the
  shared tax glossary with the original term anchor.
-->
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Opening the shared tax glossary</title>
    <link rel="stylesheet" href="../style.css?v=20260719e">
  </head>
  <body>
    <main>
      <section>
        <h1>Opening the shared tax glossary</h1>
        <p><a id="shared-glossary-link" href="../reference/glossary/index.html?topic=trust-tax">Continue to the glossary of tax terms and abbreviations</a></p>
      </section>
    </main>
    <script>
      (() => {
        const destination = new URL("../reference/glossary/index.html", window.location.href);
        destination.searchParams.set("topic", "trust-tax");
        destination.hash = window.location.hash;
        document.getElementById("shared-glossary-link").href = destination.href;
        window.location.replace(destination.href);
      })();
    </script>
  </body>
</html>
